name: Register interface review

on:
  pull_request:
    paths:
      - "**/*.rdl"

permissions:
  contents: read

concurrency:
  group: register-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  peakrdl-check:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # With a primed index cache the review only splices changed files
      # (~1-3 min even at 800k registers). Swap covers the fallback paths —
      # a cold cache or a change the incremental splicer can't handle —
      # where a full ~10 GB compile would otherwise OOM-kill the runner.
      - name: Add swap for large register map compiles
        run: |
          sudo fallocate -l 12G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - uses: chrismcdev/PeakRDL-check/action@v0.3.0
        with:
          base-ref: ${{ github.event.pull_request.base.sha }}
          head-ref: ${{ github.event.pull_request.head.sha }}
          fail-on: breaking
