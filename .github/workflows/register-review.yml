name: Register interface review

on:
  pull_request:
    paths:
      - "**/*.rdl"

permissions:
  contents: read

jobs:
  peakrdl-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: chrismcdev/PeakRDL-check/action@v0.2.1
        with:
          base-ref: ${{ github.event.pull_request.base.sha }}
          head-ref: ${{ github.event.pull_request.head.sha }}
          fail-on: breaking
