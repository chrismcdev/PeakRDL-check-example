name: Register interface review

on:
  pull_request:
    paths:
      - "**/*.rdl"

permissions:
  contents: read

concurrency:
  group: register-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  peakrdl-check:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Diffing a modified large register map peaks around 10 GB, which is
      # marginal on hosted runners; swap lets the compile grind through
      # instead of the runner being OOM-killed ("The operation was canceled").
      - name: Add swap for large register map compiles
        run: |
          sudo fallocate -l 12G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - uses: chrismcdev/PeakRDL-check/action@v0.3.0
        with:
          base-ref: ${{ github.event.pull_request.base.sha }}
          head-ref: ${{ github.event.pull_request.head.sha }}
          fail-on: breaking
